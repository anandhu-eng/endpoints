name: online-llama3.1-8b-cnn-benchmark
version: '1.0'
type: online
model_params:
  name: meta-llama/Llama-3.1-8B-Instruct
  temperature: 0.0
  top_p: 1.0
  max_new_tokens: 128
  streaming: 'on'
datasets:
- name: cnn_dailymail::llama3_8b
  type: performance
  samples: 2000
  parser:
    input: prompt
settings:
  runtime:
    min_duration_ms: 600000
    max_duration_ms: 3600000
    n_samples_to_issue: 2000
    scheduler_random_seed: 137
    dataloader_random_seed: 111
  load_pattern:
    type: concurrency
    target_concurrency: 1
  client:
    num_workers: 4
    record_worker_events: false
    log_level: INFO
    warmup_connections: -1
    max_connections: -1
    transport:
      type: zmq
      recv_buffer_size: 16777216
      send_buffer_size: 16777216
      io_threads: 4
      worker_io_threads: 1
      high_water_mark: 0
      linger: -1
      immediate: 1
    stream_all_chunks: false
    worker_initialization_timeout: 60.0
    worker_graceful_shutdown_wait: 0.5
    worker_force_kill_timeout: 0.5
    max_idle_time: 4.0
    min_required_connections: -1
    worker_gc_mode: relaxed
metrics:
  collect:
  - throughput
  - latency
  - ttft
  - tpot
endpoint_config:
  endpoints:
  - http://localhost:9000
  api_type: openai
report_dir: logs/llama3_8b_cnn_online
timeout: 6000.0
verbose: false
enable_cpu_affinity: true
